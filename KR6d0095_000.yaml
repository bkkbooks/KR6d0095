front:
  text: 製疏始末噫弘經難矣弘法華尤難弘法華而但事演說已難矣若著疏尤更難余身歷之乃深信之余族出冀屬家新邑姓趙氏父母家寒不能贍養八歲捨而出家師近莊農又不能教乃就學於祖始業儒典二載頗識字義間習諷誦惟朝夕功課而已十一歲時隨祖至檀越袁公家眾僧誦法華經次公戲謂余曰沙彌受我齋供能為我誦經乎余曰諾因隨眾誦經若宿習然舉眾皆異祖亦歡喜乃摩頂而對眾曰此子必從僧中來也依歲於岫雲圓具微攻律典津津然以聽教為念初於善應聽彌陀次於衍法聽楞嚴皆茫無所了後於雍正二年甲辰覲香嵒聽法華每遇難理會處輒有新悟異彼舊說質之不公公深許之於是遂有著經之念閱明年隱居妙峯山之石草精舍援筆始註至方便品初雙歎智慧之文疑情頓發越十五日不能措一詞白晝翻閱丙夜思惟竟至視聽罔然食不知味時有人廣修在傍輒笑之以為入魔境矣一日讀經至如是相處忽然有省始信古人所謂山河及大地全露法王身者不我欺也自是不但於是經渙然無疑乃至徧觀諸經亦皆渙然無疑矣及欲續著是非潛興賓主失宜所願不果繼爾由岫雲至聖感足未至閫而猜忌斯生所賴知是法障志不少移岫雲續前槀聖感錄科判終以力不勝任遁跡西禪乞食自支欲終厥志無何逆緣方殄順障旋興蒙僧錄司舉授萬善殿教習居二年與諸沙彌為伍將課業教儀之不暇尚何心於著述哉庚戌冬辭萬善住遺光壁不障身室難蔽日日馳騁於土木時夤緣於奔馳間雖開講設期不過勉應來學而究於是疏無暇及也癸丑春矢志閉關重理前槀甫完正宗又值公令奉旨圓明園校對宗鏡等書緣茲日事筆墨折衷古今於臆見不無少補時思華嚴為諸經之王清涼擅一家之宗不究其源寧攝於末由是於乾隆六年辛酉啟建華嚴講期醉心大疏三越暑寒望大海之洪深自鄙行潦目太虗之寬濶羞詡芥空甲子冬再講斯經重治茲疏功未及半即赴他請乙丑冬歸自清涼誓終此志約閉無期之關限待有成之日心祈三寶仰慈悲以資神身䇿六時繼朝昏而御硯爰紀功竣時在丙寅春之建辰月也然自憶驅烏之年不習便誦負笈之際一聽微明似有宿緣因敢輒著乃竟至二十餘年稾經三易本雖粗定梓尚未然且其間順逆交攻數斷數續若非如來遙見守護其志幾為遭際所隳甚哉著疏之難復難也雖然二十餘年自視若夢期也住此住彼迴想若夢中人也幾踰四十萬言皆夢中寱語其間或順或逆皆夢中境界即今編序始末依然夢中說夢伏望後之閱我疏處我境者皆應作如是觀旹乾隆歲在柔兆攝提格仲呂佛誕日賢宗後學通理謹識別古凡例是經流傳震旦疏記論解甚夥文富義博誠讓文句搜金集玉無偕大成今為接引初機漸入堂奧有異舊說恐駭新聞宜強周覧勿輕間然是疏自名指掌取其明而且易不避訓詁或涉繁蔓智果超方以任捨繁從要立尚扶壁且須由粗人微勿嫌摘葉尋枝莫便掛一漏十通理少而失學智無兼人未能徧扣高明廣覽古著疏中一言一句多自胸襟流出不善他文未敢輒入非有揀棄勿強是非一音圓被異解各呈杵臼繩箕共說象身之似鵠雪貝稻孰明乳色之真因枝尋本各選其由入道從緣不一而足勿謂多事有礙廣傳台賢兩宗證法次第多引法華喻文如引火宅喻中說怖畏事以證華嚴大教難投今古通遵似無可議今疏易為苦諦太煞徑庭要知引證者取其大綱或有忽於細目著解者別其細目不惟冒似大綱明知違古不敢背經賜覧高賢幸垂原諒諸如此類無煩俱述一經脈絡有綱有目目中復有綱目如世祖孫父子展轉相生曾無少紊若綱之與綱目之與目則如兄弟相次先後適宜依此分科自有層次楞嚴正脈頗得此訣今疏倣之但交師分析過甚多於應續反斷初學不察致義不貫今疏別之是續為避繁分間有一科之中含攝三二意者若不眉目莫辨異同因於本文用斷之至疏中各標其意如起首則曰初某意釋竟其次又曰某某下某意等庶不至繁分而眉目判然古疏隨文科目多不俱提如一科分三但標初科即復曲分或入文殊令初學艱於檢對今遵彌陀疏鈔科式分已俱標標已取次會文疏訖仍結某某科竟若相隣甚近者則不復結為便觀覽不至翻前揭後楞嚴正脉交師用甲乙等字以別科目層次伯亭老人亦多承用今疏全標科目且疏竟仍結前後次第顯然可見故不更置甲乙等字經中喻文古疏皆就喻立科如火宅喻中捨几用車喻等法中亦惟加一合字不即顯法致令法義隱於喻中究著方了今疏喻科即依法立如捨几用車喻易為隱實施權喻等法中亦惟去一喻字庶幾法義顯於喻中不待究著即見偈頌科目古疏皆以行數別之講演時殊難憶持細詳其法却亦無甚緊要今以每科之下既贅本文二字前後分劑已足揀別故不載行數古疏品題置於科外標頌混於科內一似無歸一似濫偈今解各安口科如遇品題則曰此處有品題或直標品題云某某釋竟乃曰經文分幾如遇標頌則曰此處有標頌或直言標頌云某某釋竟乃曰正頌分幾講者依之庶品題有歸而標俱不濫矣什師分經文成七卷附以疏文則七卷不能收攝古德或另分卷目未免有背譯主本意今疏卷目仍舊但於過厚者分之題中標以某卷之上某卷之下蓋為珍重佛法不敢擅易也古德著疏間有與私意相符者亦微有採掇若全用其語則標以名字如言大成云等若少有更換則言大成義云等蓋不敢掩古之善也經前十門先已粗定文多從簡義尤避繁蓋得少為足強人同我惟圖易持不顧屈經後因講華嚴閱大疏乃知非繁不能盡妙惟簡無以匠心且法華華嚴相為終始若不法彼懸談恐致昧斯圓理故茲重製有異舊聞較常似多擬彼猶略當善會之可也法華經指掌疏目次卷首科文懸示卷第一之上序品第一卷第一之下方便品第二卷第二之上譬喻品第三卷第二之下譬喻品之餘信解品第四卷第三藥草喻品第五授記品第六化城喻品第七卷第四五百弟子受記品第八授學無學人記品第九法師品第十見寶塔品第十一提婆達多品第十二持品第十三卷第五安樂行品第十四從地涌出品第十五如來壽量品第十六分別功德品第十七卷第六隨喜功德品第十八法師功德品第十九常不輕菩薩品第二十如來神力品第二十一囑累品第二十二藥王菩薩本事品第二十三卷第七妙音菩薩品第二十四觀世音菩薩普門品第二十五陀羅尼品第二十六妙莊嚴王本事品第二十七普賢菩薩勸發品第二十八事義法華經指掌疏目次終法古提綱圓融露布寥寂冲虗非權非實即三即一混萬化為一體逈諸法而獨存不可得而思議者其惟實相歟會權歸實廢三立一縱指十如奪讓盡思與雜華而合彩掩眾景以孤輝亦不可得而思議者其惟妙法蓮華經歟故我世尊證此法印現於覺場垂智輪於高山吐玄宗於法界為憐窮子暫卸珍衣分宗曲順乎時機三乘漸開於諸會擬將潛輝真際仍思還照雄峯特赴靈山廣集緣眾聊施前導演無量義之微言全揭後宗舒一毫光而遠照彌勒致問於今日文殊證答於往因既洩真機詎能緘口所以三昧初起二智頻揚羣疑交攻於眾懷三請獨慇於身子欲堅眾心斥非機於五千增慢為發真信比難逢於一現優曇述自述他明出世之致意全同說權說實顯入大之文軌一定上根已悟中士猶迷記授華光之徵喻酧身子之請方之長者火起其家癡子遊戲乎中不知不覺慈父驚聞於外弗救弗寧許三輿而與一車知長者之意出真誠開三乘而顯一道信如來之言無虗妄二乘歷敘執迷自比窮子四子同呈信解宜付家珍進示雨無二滋差別在物令知法本一味深淺由機乃通授果記顯示喻說已周復別開因緣引接下根不墜共遊寶所同記佛乘衣內明珠指在親友既有學旋慕其芳迹而如來等賜以真慈欲彰普濟之功故因藥王以顯益為明弘願之力乃借多寶而祈通狂慧廢置進修觀迦文因種於多劫應知心慚鈍根高推聖境視龍女果證於一時亦思力奮於是一肩擔荷幸斯道之典型得人四行執持喜禦難之柯柄有法又以新記聲聞初心菩薩智量淺狹罔克弘濟故假他方開士請命弘經遠召本地門徒丕承佛道補處菩薩執近迹而迷遠因說父少子老之喻中天調御依本壽而顯妙用舉良醫背子之匹宏功既彰迷封斯啟不惟新記聲聞初心菩薩頓覺身𨺗妙峯自此深位上士積行高哲轉如神遊香海分別功德功德不可限量較量福因福因詎有邊涯六根清淨不輕之證據昭然四眾毀非阿鼻之報應非妄地涌薩埵發弘願於分身國土滅後通經聊以感知遇之隆恩人中師子現神力於無邊海會當陽嘉讚殆以堅克繩之深信將罷法座極口叮嚀恐墮岐途再垂成範果能我法執盡如藥王之焚身淨穢情忘若妙音之遠至還須無方圓應重踐普門助修假秘密之功防心援知識之力四法成就三七精修是經之必得無疑普賢之現身有願如斯流通而流通斯無滯矣然則斯經也豈獨夫次第為然哉祇如聖毫東燭一化全彰賢眾西來四法重示始固可以攝後終亦何曾遺前且也文字性空空無不容實相體徧徧無不備故令一言一句達無量無邊之義若受若持成最圓最妙之因既全事之理隨事而一一俱彰亦全理之事隨理而一一互涉於是土田三變非垢非淨分身俱來不一不多多劫半日而延促同時生滅常住而隱顯俱在舌相毛光即靈鷲而上至梵世彈指謦欬由娑婆而遐播十方是皆超乎心踪絕於言道異時之所不見非機之所不聞故謂妙法蓮華者乃標其玄微喻以希有之稱也理也無知敢希妙諦在飄零而思返迷道路而難歸幸以微緣獲覩聖典如親怙恃盡命弘持尋要義於博文贅浮詞於玄理亦知佛道如山蟻步無能窮其際聖智擬海蠡量奚足較其源姑就愚見聊接蒙童爰取易明目曰指掌仍復翹勤五體歸命三尊展此精誠祈求加被稽首靈山說法主乘願證經多寶尊雲集分身無量佛一乘實相妙蓮華舊住新出二部僧無盡三寶攝授我令我所作速圓成流通利益無窮盡
