body:
  text: 弘傳序科解釋此經啟以十門一教起因緣第一二藏乘分攝第二三能被教義第三四所被機宜第四五體性淺深第五六宗趣通別第六七部類品會第七八疏序通經三一釋序題妙法二釋序主終南三釋序文三一敘經緣起三一總標大意妙法二歷敘緣起二一兩土處時蓋結二三朝翻譯三一晉朝翻譯三一翻譯時年西晉二能譯依正長安三結所譯名初翻二秦朝翻譯三一翻譯時年東晉二能譯依正龜茲三結所譯名次翻三隋朝翻譯三一翻譯時年隋氏二能譯依正大興三結所譯名後所三預防伏難四一防獨宗一本難三經二防不宗餘本難時所三防餘本有異難自餘四防有異當述難具如二敘經宗旨三一懸敘說經之緣三一反顯二一反顯教到夫以二反顯機熟適化二正明二一正明機熟所以二正明教到金河三防問二一防教猶未到問豈非二防機猶未熟問是知二正敘一經宗旨五一序分宗旨所以二法說宗旨出定三喻說宗旨朽宅四因緣宗旨化城五顯益宗旨鑿井三結讚教勝機深二一結經讚教二一結經惟遠調義二讚教緣勝自非二結持讚機二一結持隆盛自漢二讚機因深將非三祈願述意二一明序祈願輙於二歎經述意弘讚九總釋名題十別解文義妙法蓮華經卷第一科九總釋名題二一經題妙法二譯人姚秦序品十別解文義三一序分品題經文二一六緣證信序二一總明五緣如是二別列聽眾二一分科別列三一三乘交叅四一詳列無學三一舉類標數與大二明位歎德二一明位皆是二歎德無復三指名總結二一指名別列其名二結略顯廣如是二略述有學復有三總陳尼眾摩訶四廣明菩薩三一舉類標數菩薩二明位歎德二一明位皆於二歎德供養三指名總結二一指名別列其名二結略顯廣如是二八部該羅六一天王天眾爾時二龍王龍眾有八三緊那羅眾有四四乾闥婆眾有四五阿修羅眾有四六迦樓羅眾有四三檀眾俱至韋提二敘儀總結各禮二一光發起序四一顯相逗機三一說經入定爾時二雨華動地是時三大眾喜觀爾時二放光東照二一一光所照之境爾時二諸境所現之相三一眾生機感於此二諸佛化應二一從實施權二一從實又見二施權并見二會權歸實復見三機盡化息復見三會眾騰疑二一彌勒疑念爾時二大眾疑念爾時四問答發起二一彌勒請問二一略問二一長行爾時二偈頌標頌文殊二詳問四一兼陳顯相雨曼二正陳放光二一一光所照之境眉間二諸境所現之相三一眾生機感諸世二諸佛化應二一從實施權二一從實又覩二施權二總陳梵音二別陳若人二會權歸實二一結前起後文殊二正陳機宜二一總標種種因緣我見二別陳信解相貌二一次第緩陳六一布施三一外施或有二內外施或有三內施又見二持戒文殊三忍辱或見四精進又見五禪定又見六智慧復見二不次急說六一精進又見二持戒又見三忍辱又見四禪定又見五布施或見六智慧或有三機盡化息二一供養舍利文殊二起塔嚴國又見三結見求決佛放四防難申問四一防初難申初問四眾二防次難申次問佛子三防三難申三問佛坐四防四難申四問示諸二文殊領答二一略答二一惟付直答爾時二引古作證諸善二詳答二一長行四一總引燈明二一詳引最初一佛二一總標化儀諸善二別明三善其義二略引相繼二萬次復二別明往事五一時至機熟二一略舉時機其最二義顯至熟是八二顯相逗機三一說經入定是時二雨華動地是時三大眾喜觀爾時三放光東照爾時四會眾騰疑彌勒五說法授記二一出定說法時有二唱滅授記二一對眾唱滅日月二授記潛輝時有三結會古今二一師弟本因二一文殊本因佛滅二彌勒本因八百二結會釋疑彌勒四應問結答今見二偈頌四一頌總引燈明我念二頌別明徃事五一頌時至機熟佛未二頌顯相逗機時佛三頌放光東照二一一光所照之境佛放二諸境所現之相二一眾生機感示一二諸佛化應二一從實施權二一從實有見二施權一一二會權歸實三一進戒二度或有二施忍二度又見三禪慧二度又見四頌會眾騰疑爾時五頌說法授記二一頌出定說法天人二頌唱滅授記二一頌對眾唱滅佛說二頌授記潛輝世尊三頌結會古今二一頌師弟本因二一頌文殊本因是妙二頌彌勒本因是妙二頌結會釋疑彼佛四頌應問結答四一答第一問我見二答第二問今相三答第三問諸人四答第四問諸求序分已竟二正宗分三流通分方便品二正宗分二一約今時門頭以彰出世本懷三一略明權實以動執生疑二一略明權實二一長行二一約智慧稱歎二一歎諸佛智慧二一標歎二智爾時二依次釋成所以二歎自證智慧二一總顯具足舍利二分文別歎舍利二約諸法顯示三一取要絕言舍利二徵起釋成所以三轉釋釋詞所謂二偈頌二一正頌長行二一頌約佛慧稱歎二一頌歎諸佛智慧二一頌標歎二智世雄二頌依次釋成本從二頌歎自證智慧我已二頌約諸法顯示如是二極顯難知三一許信得解諸餘二揀思不及三一揀聲聞諸佛二揀辟支辟支三揀菩薩新發三明證始知又告三略為顯破舍利二動執生疑二一千二動執作念二一躡今教以作念爾時二執昔教以成疑佛說二身子騰疑三請三一請為上根二一長行爾時二偈頌二一頌躡舉疑端慧日二頌陳疑致請無漏二請為中根二一如來為人天絕言爾時二身子為中根啟請二一長行舍利二偈頌爾時三請為下根二一如來為上慢絕言佛復二身子為下根啟請二一長行爾時二偈頌爾時略明權實以動執生疑竟二廣明權實以斷疑生信三極顯經功以借人弘法二約實際理地以顯應化妙用二廣明權實以斷疑生信三一法說一周被上根二一如來說法二一長行四一許說誡聽三一應求許說爾時二因退勸勉說此三當機願聞舍利二讚法勸信佛告三正為分解三一略為分解三一略解諸佛權實舍利二略解自證權實二一標舉徵釋惟有二轉釋釋詞舍利三總結以顯道同佛告二詳為分解三一詳解諸佛權實三一列上總標舍利二分文別列三一過去佛同舍利二未來佛同舍利三現在佛同舍利三總結本懷舍利二詳解自證權實舍利三總結以顯道同舍利三舉濁防難舍利四斥過結勸三一設言婉斥舍利二覿面直斥三一直斥其非又舍二徵起釋成所以三轉顯其過除佛三結勸信受舍利二偈頌四一頌許說誡聽比丘二頌正為分解三一頌略為分解三一合頌自他之權二一頌諸佛之權諸佛二頌自證之權二一通為羣機眾生二別為二乘鈍根二合自他之實二一頌自證之實二一會權歸實我設二三根獲益二一正為上根有佛二兼為中下聲聞二頌諸佛之實十方三義頌結顯道同二一正頌長行諸佛二防問斷疑二一防承上致問若人二斷序分餘疑我以二頌舉濁防難二一自慶願滿舍利二義頌長文二一頌佛出濁世若我二頌順時說三是故三頌詳為分解三一頌詳解諸佛權實二一頌例上總標我有二頌分文別列三一頌過去佛同二一正頌長行過去二補頌餘義二一總標異外權實又諸二逐類別為顯示三一佛在受法眾若有二佛滅依教眾四一戀佛回心眾諸佛二起塔造廟眾諸佛三建形畫像眾若人四供像稱名眾若人三廣記懸記眾於諸二頌未來佛同二一正頌長行未來二補頌防難四一防何得無一不成難諸佛二防不合廣說諸法難未來三防何必惟為一乘難諸佛四防惟一宜應速說難是法三頌現在佛同二一正頌長行天人二補頌防問知眾二頌詳解自證權實二一正頌長行今我二補頌廣演二一眾生機感舍利二如來化應二一從實施權二一從實不得三一三七思惟我始二諸天請法爾時三作念無計我即二隱實施權三一尋念方便尋念二諸佛慰喻作是三正施權乘三一申屈轉念舍利二先度五人思惟三總結防問是名二會權歸實三一機熟時至舍利二等賜一乘二一預防問難舍利二正明等賜今我三聞法獲益菩薩三頌總結以顯道同如三三頌讚法勸信二一正頌長行二一頌讚法舉喻諸佛二頌勸信無虛聞法二補頌防難二一防諸佛何故同秘難以五二防如來何故普告難有慚四頌斥過結勸舍利如來說法已竟二上根獲益二喻說一周被中根三因緣一周被下根妙法蓮華經卷第二科譬喻品二上根獲益二一身子領解二一長行二一領解歡喜爾時二徵釋其由二一昔日疑悔三一對境傷感所以二獨處思惟世尊三常時尅責世尊二今日信解而今二偈頌二一頌領解歡喜我聞二頌徵釋其由二一頌昔日疑悔三一頌獨處思惟我處二頌常時尅責我常三頌對境傷感我常二頌今日信解二一頌聞法斷疑二一遠斷昔疑今聞二近斷前疑佛於二頌歡喜自信聞佛二如來與記二一開迹顯本爾時二正與授記二一長行四一行因得果舍利二依正莊嚴四一國土嚴淨國名二三乘具足華光三劫名殊勝其劫四菩薩充滿彼諸三主伴壽量舍利四遠近化事華光二偈頌二一正頌長行四一頌行因得果舍利二頌依正莊嚴過無三頌主伴壽量佛為四頌遠近化事佛滅二結勝歡喜華光三時眾供養二一總明眾供爾時二別明天供二一經家敘供釋提二諸天陳詞二一歷敘聖教而作二稱讚回向是法法說一周被上根竟二喻說一周被中根四一身子代請爾時二如來許說爾時三正說譬喻二一長行三一喻說三一喻眾生機感三一喻所感之佛舍利二喻能感之眾其家三喻結成感義長者二喻如來化應二一喻從實施權二一喻從實不得二一喻三七思惟舍利二喻作念無計復更二喻隱實施權二一喻先示苦集三一喻尋念方便我當二喻正示苦集作是三喻違情不信父雖二喻次施道滅三一喻尋念方便爾時二喻正施道滅父知三喻適願修證爾時二喻會權歸實三一喻時至機熟是時二喻等賜一乘二一喻正賜一乘舍利二喻廢立之由所以三喻聞法獲益是時三喻佛語無虛三一如來就喻垂問舍利二身子依問直答二一總答舍利二別明二一喻許三無虛是長二喻與一無虛世尊三如來讚善印許佛告二法合三一眾生機感三一所感之佛舍利二能感之眾恒求三結成感義見諸二如來化應二一從實施權二一從實不得二一三七思惟舍利二作念無計舍利二隱實施權二一提喻貼合舍利二正明施權二一先示苦集而作二次施道滅二一正施道滅汝速二適願修證三一聲聞修證舍利二辟支修證若有三菩薩修證若有二會權歸實二一重提前喻舍利二以法貼合二一時至機熟如來二等賜一乘二一廢立之由如來二正明等賜是諸三佛語無虛二一重提前喻舍利二以法貼合如來三結答舍利二偈頌三一正頌長行三一頌喻說二一頌眾生機感喻三一頌所感之佛喻譬如二頌能感之眾喻四一喻三界依報有一二喻三界正報二一總喻五道有五二別喻利鈍五一別喻五鈍五一喻慢使鴟梟二喻嗔使蚖蛇三喻疑使守宮四喻癡使屎尿五喻貪使狐狼二別喻五利二一結前起後其舍二正喻五利五一喻邪見夜叉二喻戒見鳩槃三喻身見復有四喻見見復有五喻邊見復有三總結二喻夜叉三喻三界眾苦是朽四喻逼迫之相三一略喻依報之相棟梁二詳喻正報之相二一喻下界之相諸鬼二喻上界之相臭烟三總結依正二喻其宅三頌結成感義喻是時二頌如來化應喻二一頌從實施權喻二一頌從實不得喻方宜二頌隱實施權喻二一頌先示苦集喻二一頌正示苦集喻告諭二頌違情不信喻諸子二頌次施道滅喻三一頌尋念方便喻是時二頌正施道滅喻告諸三頌適願修證喻諸子二