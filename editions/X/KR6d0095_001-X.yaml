破闇又如三喻尊特殊勝二一喻經尊特又如二喻經殊勝又如四喻苦與樂宿王二書寫功德若人三供養功德若書二約本品明德四一聽聞功德宿王二受持功德若有三修行功德四一轉生極樂若如二離惱得忍不復三見佛遙讚得是四指益結告宿王四讚善功德若有三囑應當弘護二一囑弘本品是故二囑護全經宿王三多寶以有益而讚問說是藥王盡執為法竟二妙音忘情弘經三觀音遣相圓應二助修之法三大會禮散妙法蓮華經卷第七科妙音菩薩品二妙音忘情弘經四一妙音忘情遠來二一遠來之由三一蒙釋迦光二一如來光照其國爾時二妙音𫎇光欲來二一經家敘德爾時二𫎇光欲來釋迦二奉本師命二一本師誡令忘情爾時二妙音奉命現相四一奉命歸功妙音二先現來相於是三文殊推因爾時四如來指答爾時三應多寶喚二一多寶受請遠喚文殊二妙音同眾俱發於時二正明遠來二一敘相標來是菩二具儀晉見二一先見釋迦到已二次見多寶世尊二如來論其功德三一先論宿世善根二一華德請問爾時二如來引答佛告二次論現在神智二一極顯因力華德二詳示果用二一總標華德二別明二一應化世間二一別明現身或現二總結神智華德二應化出世若應三後論三昧名字爾時三妙音事畢還國三一饒益事畢說是二妙音還國爾時三對佛述成白佛四此眾聞品獲益說是妙音忘情弘經竟觀世音菩薩普門品三觀音遣相圓應三一長行別示二一問答得名所以二一當機舉名請問爾時二如來備示感應二一正答得名所以三一總標尋聲救苦佛告二別示持名感應若有三結答得名因緣以是二廣顯稱名感應四一能脫四難二一別明脫難四一能脫戮難若復二能脫鬼難若三三能脫刑難設復四能脫賊難若三二總結神力無盡二能離三毒二一別明離毒若有二總結神力無盡三能應二求二一別明應求若有二總結神力無盡四能得多福三一舉福勸持若有二以餘較量無盡三結顯多量無盡二問答遊化方便二一當機進問遊化無盡二如來備示感應二一廣顯應化諸國二一明應顯化八一能應三聖佛告二能應六天應以三能應五人應以四能應四眾應以五能應眾婦應以六能應二童應以七能應十類應以八能應力士應以二結德勸供無盡二正答遊於娑婆二一顯示妙德三一能施無畏是觀二能感供養無盡三能修供養爾時二應問結答無盡二偈頌合顯二一重問得名所以世尊二合顯名遊化二一顯得名所以三一總標具足二別顯二一能免三災假使二能脫八難四一怨賊刑戮難或在二枷鎻毒藥難或囚三羅剎惡獸難或遇四毒蟲暴雨難蚖蛇三總結眾生二顯遊化方便二一廣顯應化諸國具足二正顯遊於娑婆諍訟三聞品獲益二一持地稱揚爾時二時眾發心佛說正修之法已竟陀羅尼品二助修之法三一神呪以護外魔二一護法說呪三一菩薩說呪二一藥王說呪三一問聞持福爾時二正說神呪爾時三禁毀讚善世尊二勇施說呪三一預明呪力爾時二正說神呪即於三指呪禁毀世尊二天王說呪二一多聞說呪二一為護說呪爾時二因呪現身世尊二持國說呪二一為護說呪爾時二指呪禁毀世尊三羅剎說呪二一正以呪護三一經家敘名爾時二為護說呪同聲三指邪禁毀寧上二兼以身護二一羅剎願護諸羅二如來讚勸佛告二聞說得忍說是二善友以護內心四妙莊嚴王本事品一總敘本人二一敘本地師親爾時二敘本地昆季有二二詳明徃事二一二子為父現神二一現神之由二一為徃聞佛法爾時二為遵奉母命母告二正現神變於是二妙嚴轉邪成道五一轉邪詣佛三二玅嚴受化轉邪時父二二子祈願勸詣二一先於母所祈願於是二次勸父母時詣於是三宮眷同詣佛所二一敘宮眷德彼時二正明同徃於是二聞法興供爾時三得記出家時雲四修行成道王出五懷德自誓三一妙嚴懷二子德即升二如來印讚發迹爾時三自誓永離邪見妙莊三結會古今二一總與結會佛告二別讚二士是藥四聞品獲益佛說三取要以尅修期四普賢菩薩勸發品一請示要法二一普賢勸請二一率眾東來爾時二陳因勸請白佛二如來垂示佛告二發願護持三一總發大願爾時二別明擁護三一擁護讀誦是人二擁護思惟是人三擁護修習二一現身說法世尊二防非說呪亦復三自結神力世尊三明益結勸二一普賢明益勸修四一正明持益若有二舉書况顯若但三勸令修習若有四願以神護世尊二如來明益勸敬三一讚普賢德爾時二明持經益四一感應道交普賢二離障近果二一能離二障如是二能近二果普賢三得福遮毀普賢四利讚罪謗若有三結勸迎敬是故四聞品獲益說是別示修法已竟三大會禮散佛說
